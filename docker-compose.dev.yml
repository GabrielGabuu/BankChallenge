version: '3.9'

# Apenas o banco para desenvolvimento local
# Rode: docker-compose -f docker-compose.dev.yml up -d
# Backend: npm run start:dev
# Frontend: npm run dev

services:
  db:
    image: postgres:16-alpine
    container_name: bank_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bank_challenge
    ports:
      - '5433:5432'
    volumes:
      - db_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_dev_data:
